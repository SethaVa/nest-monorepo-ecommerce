name: CI/CD

on:
  pull_request:
    branches: [master]

  push:
    branches: [master]

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── 1. Detect changed services ───────────────────────────
  changes:
    runs-on: ubuntu-latest

    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      user-service: ${{ steps.filter.outputs.user-service }}
      catalog-service: ${{ steps.filter.outputs.catalog-service }}
      order-service: ${{ steps.filter.outputs.order-service }}
      payment-service: ${{ steps.filter.outputs.payment-service }}
      inventory-service: ${{ steps.filter.outputs.inventory-service }}
      shipping-service: ${{ steps.filter.outputs.shipping-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      libs: ${{ steps.filter.outputs.libs }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'apps/api-gateway/**'

            user-service:
              - 'apps/user-service/**'

            catalog-service:
              - 'apps/catalog-service/**'

            order-service:
              - 'apps/order-service/**'

            payment-service:
              - 'apps/payment-service/**'

            inventory-service:
              - 'apps/inventory-service/**'

            shipping-service:
              - 'apps/shipping-service/**'

            notification-service:
              - 'apps/notification-service/**'

            libs:
              - 'libs/**'
              - 'package.json'
              - 'tsconfig*.json'

  # ── 2. Lint & tests ──────────────────────────────────────
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

  # ── 3. Build Docker images ───────────────────────────────
  docker:
    name: Docker Build — ${{ matrix.service }}

    needs: [changes, quality]

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - catalog-service
          - order-service
          - payment-service
          - inventory-service
          - shipping-service
          - notification-service

    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          build-args: |
            SERVICE=${{ matrix.service }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest