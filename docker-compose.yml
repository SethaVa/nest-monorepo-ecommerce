version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports: ['5432:5432']

  mongodb:
    image: mongo:7
    ports: ['27017:27017']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
    ports: ['9200:9200']

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ['9092:9092']
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  
  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    ports: ['3001:3001']
    env_file: apps/user-service/.env
    depends_on: [postgres, kafka]
    restart: unless-stopped

  catalog-service:
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    ports: ['3003:3003']
    env_file: apps/catalog-service/.env
    depends_on: [mongodb, elasticsearch, kafka]
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    ports: ['3002:3002']
    env_file: apps/order-service/.env
    depends_on: [postgres, kafka]
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    ports: ['3004:3004']
    env_file: apps/payment-service/.env
    depends_on: [postgres, kafka]
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile
    ports: ['3005:3005']
    env_file: apps/inventory-service/.env
    depends_on: [postgres, kafka]
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    env_file: apps/notification-service/.env
    depends_on: [kafka]
    restart: unless-stopped

  shipping-service:
    build:
      context: .
      dockerfile: apps/shipping-service/Dockerfile
    ports: ['3006:3006']
    env_file: apps/shipping-service/.env
    depends_on: [postgres, kafka]
    restart: unless-stopped